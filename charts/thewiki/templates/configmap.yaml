apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "thewiki.fullname" . }}
  labels:
    {{- include "thewiki.labels" . | nindent 4 }}
data:
  THEWIKI_SERVER__BIND: {{ printf "0.0.0.0:%d" (int .Values.app.port) | quote }}
  THEWIKI_SERVER__SERVE_FRONTEND: {{ .Values.config.server.serveFrontend | quote }}
  THEWIKI_SERVER__REQUEST_TIMEOUT: {{ .Values.config.server.requestTimeout | quote }}
  THEWIKI_DATABASE__MAX_CONNECTIONS: {{ .Values.config.database.maxConnections | quote }}
  THEWIKI_DATABASE__ACQUIRE_TIMEOUT_SECS: {{ .Values.config.database.acquireTimeoutSecs | quote }}
  THEWIKI_AUTH__ANONYMOUS_EDITS: {{ .Values.config.auth.anonymousEdits | quote }}
  THEWIKI_AUTH__REGISTRATION: {{ .Values.config.auth.registration | quote }}
  THEWIKI_AUTH__APPROVAL_REQUIRED_FOR: {{ .Values.config.auth.approvalRequiredFor | quote }}
  THEWIKI_AUTH__SESSION_TTL_HOURS: {{ .Values.config.auth.sessionTtlHours | quote }}
  THEWIKI_AUTH__ARGON2__MEMORY_KIB: {{ .Values.config.auth.argon2.memoryKib | quote }}
  THEWIKI_AUTH__ARGON2__ITERATIONS: {{ .Values.config.auth.argon2.iterations | quote }}
  THEWIKI_AUTH__ARGON2__PARALLELISM: {{ .Values.config.auth.argon2.parallelism | quote }}
  THEWIKI_TELEMETRY__LOG_FORMAT: {{ .Values.config.telemetry.logFormat | quote }}
  THEWIKI_TELEMETRY__LOG_FILTER: {{ .Values.config.telemetry.logFilter | quote }}
  THEWIKI_STORAGE__BACKEND__KIND: {{ ternary "s3" "db" .Values.storage.s3.enabled | quote }}
  {{- if .Values.storage.s3.enabled }}
  THEWIKI_STORAGE__BACKEND__BUCKET: {{ .Values.storage.s3.bucket | quote }}
  THEWIKI_STORAGE__BACKEND__REGION: {{ .Values.storage.s3.region | quote }}
  {{- with include "thewiki.s3EndpointUrl" . }}
  THEWIKI_STORAGE__BACKEND__ENDPOINT_URL: {{ . | quote }}
  {{- end }}
  {{- end }}
