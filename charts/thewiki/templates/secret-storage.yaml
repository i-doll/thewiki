{{- if and .Values.storage.s3.enabled (not .Values.storage.s3.existingSecret) (not .Values.minio.enabled) -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "thewiki.storageSecretName" . }}
  labels:
    {{- include "thewiki.labels" . | nindent 4 }}
type: Opaque
stringData:
  AWS_ACCESS_KEY_ID: {{ required "storage.s3.accessKeyId is required when storage.s3.enabled=true and neither storage.s3.existingSecret nor minio.enabled are set" .Values.storage.s3.accessKeyId | quote }}
  AWS_SECRET_ACCESS_KEY: {{ required "storage.s3.secretAccessKey is required when storage.s3.enabled=true and neither storage.s3.existingSecret nor minio.enabled are set" .Values.storage.s3.secretAccessKey | quote }}
{{- end }}
