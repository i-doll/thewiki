{{- if not .Values.database.existingSecret -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "thewiki.databaseSecretName" . }}
  labels:
    {{- include "thewiki.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{ .Values.database.existingSecretKey }}: {{ include "thewiki.databaseUrl" . | quote }}
{{- end }}
