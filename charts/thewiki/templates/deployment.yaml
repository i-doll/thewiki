{{- $usesDefaultSqlite := and (not .Values.database.url) (not .Values.database.existingSecret) -}}
{{- $desiredReplicas := int .Values.replicaCount -}}
{{- if .Values.autoscaling.enabled -}}
{{- $desiredReplicas = int .Values.autoscaling.maxReplicas -}}
{{- end -}}
{{- if and $usesDefaultSqlite .Values.persistence.enabled (gt $desiredReplicas 1) -}}
{{- fail "default SQLite with persistence supports only one replica; set replicaCount=1/autoscaling.maxReplicas=1 or set database.url/database.existingSecret" -}}
{{- end -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "thewiki.fullname" . }}
  labels:
    {{- include "thewiki.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  {{- if and $usesDefaultSqlite .Values.persistence.enabled }}
  strategy:
    type: Recreate
  {{- end }}
  selector:
    matchLabels:
      {{- include "thewiki.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "thewiki.selectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "thewiki.serviceAccountName" . }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: thewiki
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.image.repository }}:{{ default .Chart.AppVersion .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - serve
            {{- if .Values.config.auth.insecureCookie }}
            - --insecure-cookie
            {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.app.port }}
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "thewiki.fullname" . }}
            {{- if and .Values.storage.s3.enabled (or .Values.storage.s3.existingSecret (not .Values.minio.enabled)) }}
            - secretRef:
                name: {{ include "thewiki.storageSecretName" . }}
            {{- end }}
            {{- with .Values.extraEnvFrom }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          env:
            - name: THEWIKI_DATABASE__URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "thewiki.databaseSecretName" . }}
                  key: {{ .Values.database.existingSecretKey }}
            {{- if and .Values.storage.s3.enabled .Values.minio.enabled (not .Values.storage.s3.existingSecret) }}
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: {{ include "thewiki.minioSecretName" . }}
                  key: root-user
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "thewiki.minioSecretName" . }}
                  key: root-password
            {{- end }}
            {{- with .Values.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          {{- if or .Values.persistence.enabled .Values.extraVolumeMounts }}
          volumeMounts:
            {{- if .Values.persistence.enabled }}
            - name: data
              mountPath: {{ .Values.persistence.mountPath }}
            {{- end }}
            {{- with .Values.extraVolumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if or .Values.persistence.enabled .Values.extraVolumes }}
      volumes:
        {{- if .Values.persistence.enabled }}
        - name: data
          persistentVolumeClaim:
            claimName: {{ default (printf "%s-data" (include "thewiki.fullname" .)) .Values.persistence.existingClaim }}
        {{- end }}
        {{- with .Values.extraVolumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- end }}
