apiVersion: v1
kind: Pod
metadata:
  name: '{{ include "thewiki.fullname" . }}-test-connection'
  labels:
    {{- include "thewiki.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
spec:
  restartPolicy: Never
  securityContext:
    runAsNonRoot: true
    runAsUser: 1000
    runAsGroup: 1000
    fsGroup: 1000
    seccompProfile:
      type: RuntimeDefault
  containers:
    - name: wget
      image: busybox:1.37.0@sha256:1487d0af5f52b4ba31c7e465126ee2123fe3f2305d638e7827681e7cf6c83d5e
      securityContext:
        allowPrivilegeEscalation: false
        capabilities:
          drop:
            - ALL
        readOnlyRootFilesystem: true
      command:
        - wget
      args:
        - "-T"
        - "10"
        - "-qO-"
        - "http://{{ include "thewiki.fullname" . }}:{{ .Values.service.port }}/healthz"
