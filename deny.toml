# cargo-deny configuration for thewiki.
#
# thewiki is licensed AGPL-3.0-only. Direct dependencies should be
# AGPL-3.0-compatible. We allow common permissive licenses (MIT, Apache-2.0,
# BSD-*, ISC, Unicode, Zlib, MPL-2.0, CC0) for transitive deps. We explicitly
# do NOT allow plain GPL-2.0-only or GPL-3.0-only, since AGPL-3 is not
# compatible with GPL-2 (and we want to keep options open downstream).
#
# Run locally with: `cargo deny check`.

[graph]
all-features = true

[advisories]
version = 2
yanked = "deny"
ignore = []

[licenses]
version = 2
confidence-threshold = 0.93
allow = [
    "AGPL-3.0-only",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "CC0-1.0",
    "ISC",
    "MIT",
    "MPL-2.0",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
]
# `exceptions` can be used to per-crate allow an extra license, e.g. to
# accept a weak-copyleft license for a single transitive dep. Keep empty
# until something forces our hand.
exceptions = []

[bans]
multiple-versions = "warn"
# Workspace-internal crates use `workspace = true` and resolve as wildcard
# version deps. `allow-wildcard-paths` is intended for this case, but it
# only applies when the crate is `publish = false`. Our workspace crates
# are not yet pinned to a publishing strategy (M0 scaffolding), so we set
# wildcards to "allow" for now. Revisit once we either start publishing
# the crates or mark them `publish = false`.
wildcards = "allow"
allow-wildcard-paths = true
# `highlight` controls the ordering of the multiple-versions output.
highlight = "all"
# Allow build-time / proc-macro crates without restriction.
allow = []
deny = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
