name: Release

# Cross-compiled release binaries for the five tier-1 targets, plus a
# tarballed frontend bundle, attached to a GitHub Release.
#
# Trigger policy mirrors `docker.yml`: tag pushes (`vX.Y.Z`) produce a real
# release, and `workflow_dispatch` is wired up for dry-runs from the Actions
# tab. We intentionally do NOT trigger on `push: main` — the rest of CI is
# gated for pre-alpha (see `ci.yml`) and the release workflow follows the
# same stance.
#
# Why hand-rolled (and not `cargo-dist`):
#   `cargo-dist` would auto-generate most of this workflow plus shell/PS
#   installers and a Homebrew tap. It's a fine choice, but it carries an
#   opinionated `dist-workspace.toml` and ties the release surface to the
#   tool. For now we keep the workflow explicit and reviewable; revisit
#   `cargo-dist` once we want one-line installers or a Homebrew formula.
#
# Frontend handling:
#   The Rust binary will embed `web/dist/` via `rust-embed` in #16. Until
#   then we still build the SPA here and ship it as a side-car tarball so
#   downstream packagers have something to serve. Once #16 lands the binary
#   is fully self-contained and the `frontend` job becomes a convenience.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version override for dry-run (e.g. v0.0.0-test). Ignored on tag pushes."
        required: false
        default: "v0.0.0-dryrun"

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  RUST_BACKTRACE: short
  # The crate version is pinned via workspace.package.version; downstream
  # jobs read it from `Cargo.toml` so artefact filenames stay in lockstep.
  BIN_NAME: thewiki

jobs:
  prepare:
    name: Prepare draft release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.resolve.outputs.version }}
      tag: ${{ steps.resolve.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Resolve version and tag
        id: resolve
        # On a tag push, use the tag verbatim (`refs/tags/vX.Y.Z` -> `vX.Y.Z`).
        # On manual dispatch, use the `version` input so dry-runs don't clobber
        # a real release; the artefact filenames key off this value.
        run: |
          set -euo pipefail
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            tag="${GITHUB_REF_NAME}"
          else
            tag="${{ github.event.inputs.version }}"
          fi
          version="${tag#v}"
          echo "tag=${tag}"        >> "$GITHUB_OUTPUT"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "Resolved tag=${tag} version=${version}"

      - name: Create or update draft release
        # Draft release acts as the rendezvous point for the matrix builds:
        # each build job uploads its tarball + per-asset .sha256 to this tag.
        # `finalize` flips the draft flag off once everything is uploaded.
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2.6.2
        with:
          tag_name: ${{ steps.resolve.outputs.tag }}
          name: ${{ steps.resolve.outputs.tag }}
          draft: true
          prerelease: ${{ contains(steps.resolve.outputs.tag, '-') }}
          generate_release_notes: true
          # `.github/release.yml` provides the category groupings (feat/fix/...).
          fail_on_unmatched_files: false

  build:
    name: Build ${{ matrix.target }}
    needs: prepare
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux x86_64 musl — fully static, built natively on ubuntu-latest.
          # `musl-tools` provides `musl-gcc` for the linker.
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            use_cross: false
            archive: tar.gz
            bin_suffix: ""
          # Linux aarch64 musl — cross-compiled via `cross` so we don't have
          # to wrestle multilib toolchains on the runner. `cross` runs the
          # build inside a target-matched container with the correct sysroot.
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            use_cross: true
            archive: tar.gz
            bin_suffix: ""
          # macOS targets — both run on macos-latest (arm64 host as of 2025);
          # the Apple linker handles cross-link to x86_64 with `--target`.
          - target: x86_64-apple-darwin
            os: macos-latest
            use_cross: false
            archive: tar.gz
            bin_suffix: ""
          - target: aarch64-apple-darwin
            os: macos-latest
            use_cross: false
            archive: tar.gz
            bin_suffix: ""
          # Windows x86_64 — MSVC toolchain provided by the runner image.
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            use_cross: false
            archive: zip
            bin_suffix: ".exe"
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install musl tools (Linux musl native target only)
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Install Rust 1.92 with target
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable branch pin
        with:
          toolchain: "1.92"
          targets: ${{ matrix.target }}

      - name: Cache cargo registry and target
        uses: Swatinem/rust-cache@400e7407cfd7a091e5fbb6afec01ec146c432b7c # v2.7.7
        with:
          # Per-target cache key so musl/MSVC/darwin don't fight each other.
          shared-key: release-${{ matrix.target }}

      - name: Install `cross` (aarch64 musl)
        # `cross` ships its own docker images with the right sysroot per
        # target; this avoids dragging an aarch64 musl toolchain onto the
        # runner manually. We pin the same version system-wide via
        # taiki-e/install-action which caches the binary across runs.
        if: matrix.use_cross
        uses: taiki-e/install-action@65851e10cd6c377f11a60e600abc07cb08643468 # v2.79.3
        with:
          tool: cross

      - name: Build (cargo)
        if: ${{ !matrix.use_cross }}
        shell: bash
        run: cargo build --release --locked --target ${{ matrix.target }} -p thewiki-api

      - name: Build (cross)
        if: matrix.use_cross
        shell: bash
        run: cross build --release --locked --target ${{ matrix.target }} -p thewiki-api

      - name: Resolve crate version
        id: version
        shell: bash
        # Pull `workspace.package.version` straight out of the root Cargo.toml.
        # Avoids depending on `cargo metadata` (slow on cold caches) and on
        # `jq` for a one-liner.
        run: |
          set -euo pipefail
          ver=$(grep -m1 '^version' Cargo.toml | sed -E 's/version *= *"([^"]+)".*/\1/')
          echo "version=${ver}" >> "$GITHUB_OUTPUT"

      - name: Package archive
        id: package
        shell: bash
        # Layout inside the archive:
        #   thewiki-<version>-<target>/
        #     thewiki(.exe)
        #     LICENSE
        #     README.md
        # Matches what `cargo-dist` would emit so a future migration is
        # mechanical.
        run: |
          set -euo pipefail
          version="${{ steps.version.outputs.version }}"
          target="${{ matrix.target }}"
          bin="${BIN_NAME}${{ matrix.bin_suffix }}"
          stage="thewiki-${version}-${target}"
          mkdir -p "dist/${stage}"
          cp "target/${target}/release/${bin}" "dist/${stage}/"
          cp LICENSE README.md "dist/${stage}/"

          cd dist
          if [ "${{ matrix.archive }}" = "zip" ]; then
            # Windows runners have 7z; macOS/Linux have `zip`. Prefer the
            # POSIX `zip` when present so the archive layout is predictable.
            if command -v zip >/dev/null 2>&1; then
              zip -r "${stage}.zip" "${stage}"
            else
              7z a "${stage}.zip" "${stage}" >/dev/null
            fi
            asset="${stage}.zip"
          else
            tar -czf "${stage}.tar.gz" "${stage}"
            asset="${stage}.tar.gz"
          fi

          # Per-asset SHA256 file, format compatible with `sha256sum -c`.
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "${asset}" > "${asset}.sha256"
          else
            # macOS ships `shasum`; emit the same `<hash>  <file>` layout.
            shasum -a 256 "${asset}" > "${asset}.sha256"
          fi

          echo "asset=dist/${asset}"         >> "$GITHUB_OUTPUT"
          echo "sha=dist/${asset}.sha256"    >> "$GITHUB_OUTPUT"
          echo "name=${asset}"               >> "$GITHUB_OUTPUT"

      - name: Upload to release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2.6.2
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          draft: true
          files: |
            ${{ steps.package.outputs.asset }}
            ${{ steps.package.outputs.sha }}

      - name: Stash sha256 for aggregation
        # The `sums` job downloads every per-asset .sha256 and concatenates
        # them into a single `SHA256SUMS.txt` (the conventional layout used
        # by, e.g., HashiCorp / rustup release pages).
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: sha256-${{ matrix.target }}
          path: ${{ steps.package.outputs.sha }}
          if-no-files-found: error
          retention-days: 1

  frontend:
    name: Build frontend bundle
    needs: prepare
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup pnpm
        uses: pnpm/action-setup@7088e561eb65bb68695d245aa206f005ef30921d # v4.1.0
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: pnpm install
        working-directory: web
        run: pnpm install --frozen-lockfile

      - name: pnpm build
        working-directory: web
        run: pnpm build

      - name: Resolve crate version
        id: version
        run: |
          set -euo pipefail
          ver=$(grep -m1 '^version' Cargo.toml | sed -E 's/version *= *"([^"]+)".*/\1/')
          echo "version=${ver}" >> "$GITHUB_OUTPUT"

      - name: Package frontend tarball
        id: package
        # Once #16 (rust-embed) lands the Rust binary will embed `web/dist`
        # directly; until then we ship this side-car tarball for downstream
        # packagers (deb/rpm/distro builds) that want pre-built assets.
        run: |
          set -euo pipefail
          version="${{ steps.version.outputs.version }}"
          asset="thewiki-web-${version}.tar.gz"
          # Tar from inside `web/` so the archive root is `dist/`, not `web/dist/`.
          tar -czf "${asset}" -C web dist
          sha256sum "${asset}" > "${asset}.sha256"
          echo "asset=${asset}"        >> "$GITHUB_OUTPUT"
          echo "sha=${asset}.sha256"   >> "$GITHUB_OUTPUT"

      - name: Upload to release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2.6.2
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          draft: true
          files: |
            ${{ steps.package.outputs.asset }}
            ${{ steps.package.outputs.sha }}

      - name: Stash sha256 for aggregation
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: sha256-frontend
          path: ${{ steps.package.outputs.sha }}
          if-no-files-found: error
          retention-days: 1

  sums:
    name: Aggregate SHA256SUMS
    needs: [prepare, build, frontend]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all per-asset shas
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          pattern: sha256-*
          merge-multiple: true
          path: shas

      - name: Combine into SHA256SUMS.txt
        # Each per-asset file contains a single `<hash>  <filename>` line
        # already; just concatenate them in sorted order so the combined
        # file is byte-identical across re-runs.
        run: |
          set -euo pipefail
          find shas -type f -name '*.sha256' -print0 \
            | sort -z \
            | xargs -0 cat > SHA256SUMS.txt
          echo "---"
          cat SHA256SUMS.txt

      - name: Upload SHA256SUMS.txt
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2.6.2
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          draft: true
          files: SHA256SUMS.txt

  finalize:
    name: Publish release
    needs: [prepare, sums]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Flip draft -> published
        # Re-invoking the action with `draft: false` against the same tag
        # publishes the existing draft. No new uploads here — every asset
        # is already attached by upstream jobs.
        #
        # NOTE: `generate_release_notes: false` here is deliberate. The notes
        # are already populated by `prepare`; re-generating them at finalize
        # would issue a redundant API call and could clobber the body if any
        # PRs merged between the two calls.
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2.6.2
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          draft: false
          prerelease: ${{ contains(needs.prepare.outputs.tag, '-') }}
          generate_release_notes: false
