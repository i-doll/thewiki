name: Bug report
description: Report a defect.
title: "[bug] "
labels:
  - "type:bug"
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the report. The more concrete the repro, the faster the fix.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: One-sentence description of what's broken.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      value: |
        1.
        2.
        3.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behaviour
      description: Include error messages, screenshots, logs.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: thewiki version / commit
      placeholder: "v0.1.0 or commit SHA"
    validations:
      required: true
  - type: dropdown
    id: db
    attributes:
      label: Database backend
      options:
        - SQLite
        - libsql / Turso
        - Postgres
        - Not applicable
    validations:
      required: true
  - type: input
    id: deploy
    attributes:
      label: Deploy environment
      placeholder: "e.g. Docker on Debian 12, Kubernetes 1.30, bare-metal Linux"
