# thewiki — example configuration file.
#
# Copy this to `thewiki.toml` and edit, then point the binary at it with either:
#
#     thewiki serve --config thewiki.toml
#     THEWIKI_CONFIG_PATH=thewiki.toml thewiki serve
#
# Every key shown here is the built-in default; commenting one out falls back
# to that default. Environment variables override the file: `THEWIKI_*` with
# double-underscore separating nested keys (e.g. `THEWIKI_SERVER__BIND`,
# `THEWIKI_AUTH__ARGON2__MEMORY_KIB`).

# ---------------------------------------------------------------------------
# HTTP server.
# ---------------------------------------------------------------------------
[server]
# Address the listener binds to (host:port).
# Use `127.0.0.1:8080` if you are behind a reverse proxy that lives on the
# same host. Default: `0.0.0.0:8080`.
bind = "0.0.0.0:8080"

# Per-request timeout, parsed as humantime (e.g. "30s", "2m"). Omit to disable
# the timeout layer entirely — only sensible behind a proxy that enforces one.
# Default: "30s".
request_timeout = "30s"

# Override tokio's worker thread count. Omit to use one worker per logical CPU,
# which is almost always what you want.
# worker_threads = 4

# Serve the embedded SPA bundle (`web/dist/`) as a fallback for unmatched
# routes. The single-binary production deploy expects this. Set to `false`
# during local frontend development when running `pnpm dev` against
# `cargo run` — Vite then proxies `/api/*` to the Rust backend and serves
# the SPA itself, so unmatched routes here should 404 instead of returning
# a stale embedded `index.html`. Default: true.
serve_frontend = true

# ---------------------------------------------------------------------------
# Database.
# ---------------------------------------------------------------------------
[database]
# Backend driver. One of `sqlite` (default, always available) or `postgres`
# (requires the binary to be built with `--features thewiki-storage/postgres`).
# `libsql` lands in #24.
driver = "sqlite"

# sqlx URL. Must match `driver`:
#   sqlite://path/to/file.db
#   postgres://user:pass@host:5432/database
# Path is resolved relative to the working directory; absolute paths
# (`sqlite:///var/lib/thewiki/thewiki.db`) are recommended for production.
# Default: `sqlite://data/thewiki.db`.
url = "sqlite://data/thewiki.db"

# Maximum number of pooled connections. SQLite tolerates a low value;
# Postgres deploys typically want this larger. Default: 16.
max_connections = 16

# Seconds to wait for a free pool connection before failing the request.
# Default: 10.
acquire_timeout_secs = 10

# ---------------------------------------------------------------------------
# Object storage (uploads / attachments).
# ---------------------------------------------------------------------------
[storage]
# Backend selector. One of:
#   { kind = "db" }                       — store blobs in the primary DB
#   { kind = "s3", bucket = "...", region = "...", endpoint_url = "..." }
#                                         — S3-compatible (AWS, R2, MinIO, B2)
# `endpoint_url` is optional and only needed for non-AWS providers.
# Default: { kind = "db" }.
backend = { kind = "db" }

# Example S3 configuration (commented out — uncomment and adjust):
# [storage.backend]
# kind = "s3"
# bucket = "thewiki-media"
# region = "us-east-1"
# endpoint_url = "https://s3.example.com"   # optional, e.g. for R2/MinIO

# Media upload pipeline (#32). Tightens what `POST /api/v1/media` accepts.
#
# `max_upload_bytes` is the per-upload size cap; the upload endpoint returns
# 413 Payload Too Large when the request body exceeds this. Defaults to
# 10 MiB.
#
# `allowed_content_types` is the IANA MIME-type allowlist. Anything outside
# this set is rejected with 415 Unsupported Media Type. SVGs are accepted
# but scrubbed through `ammonia` (no `<script>`, no event handlers) before
# storage.
[storage.media]
max_upload_bytes = 10485760  # 10 MiB
allowed_content_types = [
    "image/png",
    "image/jpeg",
    "image/gif",
    "image/webp",
    "image/svg+xml",
]

# ---------------------------------------------------------------------------
# Authentication and authorisation defaults.
#
# These are install-time defaults; per-page protection (M1) layers on top of
# them. Page edit handlers consult these knobs at request time — see #14.
#
# The defaults below are the safest production posture (no anonymous edits,
# closed registration, no approval queue). Flip `anonymous_edits = true`
# alongside `approval_required_for = "anonymous"` if you want a low-friction
# public wiki with a moderator gate.
#
# The SPA reads these flags via `GET /api/v1/auth/policy` to decide whether
# to render the "Sign up" CTA and the "Edit anonymously" affordance.
# ---------------------------------------------------------------------------
[auth]
# When `true`, anonymous (logged-out) visitors can edit pages. The edit is
# credited to a singleton "Anonymous" user row in the `users` table, lazily
# created the first time an anonymous edit lands. Reads remain open
# regardless of this flag.
# Default: false (anonymous reads only).
anonymous_edits = false

# Account registration policy. One of:
#   "open"   — anyone can register
#   "invite" — registration requires an invite code
#   "closed" — admins create accounts manually
# Default: "closed".
#
# Surfaced verbatim via `GET /api/v1/auth/policy` so the SPA knows whether
# to show a "Sign up" affordance.
registration = "closed"

# Which classes of edits land in the moderator approval queue. One of:
#   "none"      — every edit goes live immediately
#   "anonymous" — anonymous edits require approval; authenticated edits go live
#   "new-users" — anonymous edits + edits from accounts younger than 24 hours
#                 require approval
#   "all"       — every edit requires approval
# Default: "none".
#
# When an edit matches the configured scope, the API returns `202 Accepted`
# instead of `201 Created` / `200 OK` and the page's current revision stays
# pointed at the previous head until a moderator promotes the pending edit.
# The moderator queue itself ships in M2 (#40) — for now the gate logs the
# decision but does not yet persist a `pending_revisions` row, so configuring
# anything other than `"none"` will *silently drop* edits. Only flip this
# once #40 lands.
approval_required_for = "none"

# Session lifetime in hours. Sessions are stored in the DB (no JWT), so this
# is the right knob to force re-auth. Default: 24.
session_ttl_hours = 24

# Argon2id password-hashing parameters.
#
# OWASP recommends a floor of: memory_kib ≥ 19456 (19 MiB), iterations ≥ 2,
# parallelism ≥ 1. We default to a stronger production target (64 MiB / 3 / 1);
# the binary refuses to start with values below the OWASP floor.
[auth.argon2]
memory_kib = 65536
iterations = 3
parallelism = 1

# ---------------------------------------------------------------------------
# Rate limiting.
#
# Token-bucket middleware is applied to public API routes. Anonymous requests
# are keyed by peer IP. Authenticated requests with a session cookie first pass
# a peer IP preflight to cap session lookup spray, then consume a user ID bucket
# when the session is valid. In-memory buckets are process-local, so
# multi-replica deploys should switch to a shared backend once one is available.
# ---------------------------------------------------------------------------
[rate_limit]
# Global switch. Default: true.
enabled = true
# Optional: when running behind trusted reverse proxies, derive the client IP
# from one of: "x-forwarded-for", "x-real-ip". The header is ignored unless
# the socket peer is listed in trusted_proxies, so do not put public client
# networks here. For X-Forwarded-For, the server selects the closest
# untrusted address from the right side of the chain; list every internal
# proxy that may append to the header.
# client_ip_header = "x-forwarded-for"
# trusted_proxies = ["127.0.0.1", "::1"]

[rate_limit.read]
# Safe methods (`GET`, `HEAD`, `OPTIONS`) for *anonymous* requests. Defaults
# allow a burst of 60 reads and refill 60 tokens per minute — opinionated
# defaults that operators will likely tune.
capacity = 60
refill_tokens = 60
refill_interval_secs = 60

[rate_limit.write]
# Mutating methods (`POST`, `PUT`, `PATCH`, `DELETE`, ...) for *anonymous*
# requests. Defaults allow a burst of 10 writes and refill 10 tokens per
# minute.
capacity = 10
refill_tokens = 10
refill_interval_secs = 60

# Authenticated users get their own (typically larger) buckets. Omit to share
# the anonymous limits above. Defaults: 600 reads/min, 120 writes/min.
[rate_limit.authenticated_read]
capacity = 600
refill_tokens = 600
refill_interval_secs = 60

[rate_limit.authenticated_write]
capacity = 120
refill_tokens = 120
refill_interval_secs = 60

[rate_limit.backend]
# Per-process bucket store. Default: "in-memory". Set to "redis" (with a `url`
# field) when running multiple replicas; requires building with
# `--features thewiki-api/redis`.
kind = "in-memory"
# kind = "redis"
# url = "redis://127.0.0.1:6379/0"

# ---------------------------------------------------------------------------
# Full-text search (#26).
#
# Tantivy embeds the index in-process. On every page commit the API layer
# enqueues an indexing job; a dedicated worker drains the queue and commits
# every `commit_interval_ms` or every `batch_size` jobs, whichever first —
# so the index stays at most ~`commit_interval_ms` milliseconds behind the
# database. After every successful commit the worker writes a small
# `.last_indexed` marker inside `index_path`; if the marker is missing on
# startup the binary triggers a full rebuild from storage so a crash never
# leaves the index silently stale. The `thewiki reindex` subcommand can
# also be run manually after a schema change.
# ---------------------------------------------------------------------------
[search]
# Directory the Tantivy segments live in. Created on first boot. Default:
# `data/search`. Operators on a separate disk typically override this.
index_path = "data/search"

# Commit cadence in milliseconds. Lower means fresher search at higher write
# amplification. Default: 200 (i.e. the index is at most ~200 ms behind a
# committed edit).
commit_interval_ms = 200

# Per-commit job-count threshold. A burst of `batch_size` edits commits
# immediately instead of waiting for the timer. Default: 100.
batch_size = 100

# Title-field boost applied at query time. Values above 1.0 promote
# title matches over body matches in BM25 scoring; 0.0 disables the boost
# entirely (every field weighted equally). Default: 2.0.
title_boost = 2.0

# ---------------------------------------------------------------------------
# Administrative audit log (#36).
#
# Every privileged action (page CRUD, reverts, login/logout, role changes)
# writes a row to the `audit_log` table. The full feed is exposed at
# `GET /api/v1/audit-log` (JSON) and `GET /api/v1/audit-log/atom`
# (RSS/Atom). Both endpoints require a session that holds the
# `VIEW_AUDIT_LOG` permission bit.
#
# Audit rows are append-only — there is no UPDATE/DELETE API. Storage
# enforcement is via the retention window below.
# ---------------------------------------------------------------------------
[audit_log]
# Master switch. When `false`, the read endpoints still serve historical rows
# (so an operator can audit a paused deployment) but the background pruner is
# skipped and `cargo xtask audit-log-prune` will refuse to run. Default: true.
enabled = true

# Number of days to retain audit rows. The `serve` binary runs an in-process
# pruner once an hour. Operators who prefer cron can invoke
# `cargo xtask audit-log-prune --retention-days 365` instead — e.g. with a
# nightly crontab entry like:
#
#     0 3 * * *  cd /var/lib/thewiki && cargo run -p xtask --release -- \
#                  audit-log-prune --database-url $DATABASE_URL
#
# Must be > 0. Default: 365.
retention_days = 365

# ---------------------------------------------------------------------------
# GraphQL surface (#37).
#
# `/api/graphql` mirrors the REST coverage as a GraphQL endpoint. The
# playground and introspection knobs are enabled by default for
# developer-friendly bootstrapping; flip both off in production once
# clients are wired so the schema isn't advertised to anonymous callers.
#
# Persisted queries follow the Apollo APQ shape — clients send
# `extensions.persistedQuery.sha256Hash` and the server caches the matching
# document on first sight. The cache is in-memory and process-local
# (1024-entry LRU); multi-replica deploys should leave this off until a
# shared backend ships.
# ---------------------------------------------------------------------------
[graphql]
# Serve the GraphiQL HTML at `/api/graphql/playground`. Default: true.
playground_enabled = true

# Allow `__schema` / `__type` introspection queries. Default: true.
introspection_enabled = true

# Accept persisted-query lookups (Apollo APQ). Default: false.
persisted_queries_enabled = false

# Cap on selection-set depth. Defends against deeply nested adversarial
# queries. Default: 15.
max_query_depth = 15

# Cap on query complexity score. async-graphql adds 1 per selected field by
# default; resolvers can override the cost individually. Default: 1000.
max_query_complexity = 1000

# ---------------------------------------------------------------------------
# Observability.
# ---------------------------------------------------------------------------
[telemetry]
# Log output format. One of:
#   "json"   — structured JSON, one event per line (default; friendly to
#              log shippers and aggregators)
#   "pretty" — human-readable colour output (use during local dev)
log_format = "json"

# `tracing_subscriber` env-filter directive. Mirrors `RUST_LOG` syntax.
# Default: "info,thewiki=debug".
log_filter = "info,thewiki=debug"
