[package]
name = "thewiki-api"
description = "thewiki HTTP API binary (Axum handlers, server entrypoint)."
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
authors.workspace = true

[[bin]]
name = "thewiki"
path = "src/main.rs"

[lib]
path = "src/lib.rs"

[dependencies]
# Sibling crates.
thewiki-core = { workspace = true }
thewiki-storage = { workspace = true }

# HTTP stack.
axum = { workspace = true }
tokio = { workspace = true }
tower = { workspace = true }
tower-http = { workspace = true }

# Observability.
tracing = { workspace = true }
tracing-subscriber = { workspace = true }

# CLI.
clap = { workspace = true }

# Configuration loading (defaults < TOML file < THEWIKI_* env). See `config.rs`.
figment = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
thiserror = { workspace = true }
toml = { workspace = true }

# OpenAPI generation + axum integration + Swagger UI.
utoipa = { workspace = true }
utoipa-axum = { workspace = true }
utoipa-swagger-ui = { workspace = true }

# Domain types referenced in DTOs.
time = { workspace = true }

# Binary error handling.
anyhow = { workspace = true }

# Request IDs.
uuid = { workspace = true }

[dev-dependencies]
tokio = { workspace = true }
tower = { workspace = true }
http-body-util = { workspace = true }
# `test` feature pulls in `figment::Jail`, which gives integration tests a
# sandboxed env + cwd for layered-loader assertions (#8).
figment = { workspace = true, features = ["test"] }
thewiki-storage = { workspace = true }
serde_json = { workspace = true }

[lints]
workspace = true
